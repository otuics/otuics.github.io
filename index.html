<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>otuics. — Visual Creator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --accent-red: #ff2d55;
            --accent-blue: #0a84ff;
            --accent-gold: #ffd700;
            --glass-bg: rgba(20, 20, 22, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --blur: blur(20px);
            --ease-apple: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-focus: cubic-bezier(0.1, 0.8, 0.2, 1);
            --scroll-blur: 0px; 
            --scroll-stretch: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif;
            width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
        }

        @keyframes rec-blink { 0% { opacity: 1; text-shadow: 0 0 15px var(--accent-red); } 50% { opacity: 0.3; text-shadow: 0 0 2px var(--accent-red); } 100% { opacity: 1; text-shadow: 0 0 15px var(--accent-red); } }
        @keyframes rack-focus-pull { 0% { filter: blur(25px); transform: scale(1.08); opacity: 0; } 10% { opacity: 1; } 100% { filter: blur(0px); transform: scale(1); opacity: 1; } }
        @keyframes slide-distance-scale { 0% { transform: translateX(120px); } 100% { transform: translateX(-140px); } }

        /* ANIMAZIONE SLIDESHOW ANTEPRIMA LAUREA FRA */
        @keyframes slideshow-laurea {
            0%, 20% { background-image: url('https://drive.google.com/thumbnail?id=1QfmwyjkT8-0ZQy-ZSYLi_Tft3vnftjV5&sz=w1200'); }
            25%, 45% { background-image: url('https://drive.google.com/thumbnail?id=1SQRjU9rezVKiNxUTDjBzwJtKXkYZTGpx&sz=w1200'); }
            50%, 70% { background-image: url('https://drive.google.com/thumbnail?id=1VFI-7QOIwtDzbjfM9K2xk1s2mh_52Tn5&sz=w1200'); }
            75%, 95% { background-image: url('https://drive.google.com/thumbnail?id=1VJj18fFkJh-CY_GDJ4iHslXCm-OAJ9lJ&sz=w1200'); }
            100% { background-image: url('https://drive.google.com/thumbnail?id=1QfmwyjkT8-0ZQy-ZSYLi_Tft3vnftjV5&sz=w1200'); }
        }

        header { position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: linear-gradient(to bottom, rgba(5,5,5,0.9) 0%, transparent 100%); pointer-events: none; }
        .logo { font-size: 1.5rem; font-weight: 400; letter-spacing: -0.04em; pointer-events: auto; cursor: pointer; color: #ffffff; text-shadow: 0 0 2px rgba(255,255,255,0.1); }
        .dot { color: var(--accent-red); animation: rec-blink 1.5s infinite ease-in-out; }
        .btn-reserved { background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: #fff; padding: 0.5rem 1.2rem; border-radius: 30px; font-size: 0.8rem; font-weight: 500; cursor: pointer; pointer-events: auto; transition: all 0.3s; }

        #unified-nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(20, 20, 22, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem; border-radius: 40px; display: grid; overflow: hidden; z-index: 1000; width: max-content; min-width: 320px; }
        #unified-nav > * { grid-area: 1 / 1; }
        .lens-red-line { justify-self: center; width: 2px; height: 100%; background: var(--accent-red); z-index: 5; transition: opacity 0.5s; }
        #distance-wrapper { display: flex; align-items: center; justify-content: center; width: 100%; transition: transform 0.8s, opacity 0.6s; }
        .distance-scale { display: flex; gap: 1.8rem; color: var(--accent-gold); font-family: monospace; font-size: 0.85rem; animation: slide-distance-scale 2.8s var(--ease-focus) forwards; }
        
        #menu-wrapper { display: flex; align-items: center; justify-content: center; gap: 0.2rem; transform: translateY(-120%); opacity: 0; pointer-events: none; transition: transform 0.8s, opacity 0.8s; }
        #menu-wrapper button { background: transparent; border: none; color: var(--text-muted); padding: 0.7rem 1.2rem; border-radius: 30px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
        #menu-wrapper button.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        #unified-nav.swap-complete #distance-wrapper { transform: translateY(120%); opacity: 0; }
        #unified-nav.swap-complete #menu-wrapper { transform: translateY(0); opacity: 1; pointer-events: auto; }
        #unified-nav.swap-complete .lens-red-line { opacity: 0; }

        .view-container { flex: 1; position: relative; width: 100%; height: 100%; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; padding: 8rem 2rem 10rem 2rem; opacity: 0; visibility: hidden; transform: scale(0.96); transition: all 0.5s; display: flex; flex-direction: column; align-items: center; scroll-snap-type: y mandatory; }
        .view.active { opacity: 1; visibility: visible; transform: scale(1); }
        ::-webkit-scrollbar { width: 0px; }
        
        .snap-block { scroll-snap-align: center; margin-bottom: 2.5rem; width: 100%; max-width: 380px; transition: all 0.5s; }
        .shape-card { width: 100%; border-radius: 24px; background: var(--glass-bg); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 2rem; display: flex; flex-direction: column; }
        .interactive-card { transition: all 0.5s; filter: blur(6px); opacity: 0.4; }
        .interactive-card.scroll-focus { transform: scale(1.02); filter: blur(0px); opacity: 1; box-shadow: 0 10px 30px rgba(255, 45, 85, 0.25); border-color: rgba(255, 45, 85, 0.4); }

        h1 { font-size: 3rem; font-weight: 400; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; }

        .portfolio-visual { aspect-ratio: 1 / 1; width: 100%; border-radius: 20px; background-size: cover; background-position: center; margin-bottom: 1.5rem; border: 1px solid var(--glass-border); }
        .vis-laurea { animation: slideshow-laurea 12s infinite ease-in-out; }
        .vis-commercial { background-image: url('https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=800'); }
        
        .ios-explore-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 0.7rem 1.2rem; border-radius: 20px; color: #fff; cursor: pointer; width: fit-content; transition: all 0.3s; }
        .ios-explore-btn:hover { background: rgba(255,255,255,0.15); }

        /* MODALE GALLERIA DINAMICA */
        .gallery-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(25px);
            z-index: 2000; opacity: 0; visibility: hidden; transition: 0.5s;
            overflow-y: auto; padding: 2rem;
        }
        .gallery-modal.active { opacity: 1; visibility: visible; }
        .gallery-content { max-width: 1100px; margin: 0 auto; }
        .gallery-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .close-gallery { font-size: 2rem; color: #fff; cursor: pointer; }
        
        /* GRIGLIA MASONRY (DINAMICA) */
        .masonry-grid {
            column-count: 2; column-gap: 1rem;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        .masonry-item { margin-bottom: 1rem; break-inside: avoid; }
        .masonry-item img { width: 100%; border-radius: 12px; display: block; }

        @media (min-width: 768px) {
            .snap-block { max-width: 800px; }
            .portfolio-item { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center; }
            .portfolio-visual { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">otuics<span class="dot">.</span></div>
        <button class="btn-reserved">Area Riservata</button>
    </header>

    <div class="view-container">
        
        <section id="home" class="view active">
            <div class="snap-block scroll-reveal">
                <h1 style="font-size: 5rem;">otuics<span class="dot">.</span></h1>
                <p class="subtitle">Visual Creator</p>
            </div>
        </section>

        <section id="portfolio" class="view">
            <div class="snap-block">
                <h1>Portfolio<span class="dot">.</span></h1>
                <p class="subtitle">Lavori selezionati</p>
            </div>

            <div class="snap-block">
                <div class="shape-card interactive-card portfolio-item">
                    <div class="portfolio-visual vis-laurea"></div>
                    <div>
                        <h3 style="font-family: 'Playfair Display'; font-style: italic; font-size: 2rem; margin-bottom: 1rem;">Laurea Fra.</h3>
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Un reportage dinamico del traguardo accademico. Luci, sorrisi e l'atmosfera di un giorno indimenticabile.</p>
                        <button class="ios-explore-btn" onclick="openGallery()">Esplora Progetti</button>
                    </div>
                </div>
            </div>

            <div class="snap-block">
                <div class="shape-card interactive-card portfolio-item">
                    <div class="portfolio-visual vis-commercial"></div>
                    <div>
                        <h3 style="font-family: 'Playfair Display'; font-style: italic; font-size: 2rem; margin-bottom: 1rem;">Commercial.</h3>
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Narrazioni visive per brand ed editoriali.</p>
                        <button class="ios-explore-btn">Esplora Progetti</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <nav id="unified-nav">
        <div class="lens-red-line"></div>
        <div id="distance-wrapper">
            <div class="distance-scale"><span>0.85</span><span>1.2</span><span>2.0</span><span>3.0</span><span>5.0</span><span>10</span><span>∞</span></div>
        </div>
        <div id="menu-wrapper">
            <button class="nav-btn active" data-target="home">Home</button>
            <button class="nav-btn" data-target="portfolio">Portfolio</button>
        </div>
    </nav>

    <div class="gallery-modal" id="galleryLaurea">
        <div class="gallery-content">
            <div class="gallery-header">
                <h2 style="font-family: 'Playfair Display'; font-style: italic; font-size: 2.5rem;">Laurea Fra.</h2>
                <div class="close-gallery" onclick="closeGallery()">✕</div>
            </div>
            
            <div class="masonry-grid">
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1QfmwyjkT8-0ZQy-ZSYLi_Tft3vnftjV5&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1SQRjU9rezVKiNxUTDjBzwJtKXkYZTGpx&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1VFI-7QOIwtDzbjfM9K2xk1s2mh_52Tn5&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1VJj18fFkJh-CY_GDJ4iHslXCm-OAJ9lJ&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1VMwyBQtyH5HUzIBmMKzuYC6duFovL42_&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1acJlioIKSCzodZ0DHwovZPKoJde5BWrk&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1jlT9XJFQpbOg4kmBcx2OudItyO7yKIGr&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1orykCA9Om6NhJ8kQHEU9TtYIqkjXxYQw&sz=w1200"></div>
                <div class="masonry-item"><img src="https://drive.google.com/thumbnail?id=1phIBmMXPMFuJ6cz2wi7-Ka3lZk9eaHGs&sz=w1200"></div>
            </div>
        </div>
    </div>

    <script>
        // Logica Navigazione
        const nav = document.getElementById('unified-nav');
        setTimeout(() => nav.classList.add('swap-complete'), 2500);

        const buttons = document.querySelectorAll('.nav-btn');
        const views = document.querySelectorAll('.view');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.getAttribute('data-target');
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                views.forEach(v => {
                    v.classList.remove('active');
                    if(v.id === target) v.classList.add('active');
                });
            });
        });

        // Logica Focus allo Scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.classList.add('scroll-focus');
                else entry.target.classList.remove('scroll-focus');
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('.interactive-card').forEach(card => observer.observe(card));

        // Logica Galleria
        function openGallery() {
            document.getElementById('galleryLaurea').classList.add('active');
            document.body.style.overflow = 'hidden'; // Blocca lo scroll del sito sotto
        }
        function closeGallery() {
            document.getElementById('galleryLaurea').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
